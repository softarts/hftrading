# =============================================================================
# HFT Trading System — Default Configuration
# =============================================================================

# --- Pipeline mode ---
# direct: CsvFeedSource → OrderBook  (development / benchmarking)
# aeron:  CsvFeedSource → AeronPublisher → [aeron:ipc] → AeronSubscriber → OrderBook
pipeline.mode=direct

# --- Input ---
input.csv.path=out/bench_1m.csv
input.csv.buffer.bytes=262144

# --- Aeron ---
aeron.channel=aeron:ipc
aeron.stream.id=1001
# true = embed MediaDriver in JVM process (development); false = external driver process
aeron.embed.driver=true
# CPU core to pin subscriber / publisher threads (-1 = no pinning)
aeron.subscriber.cpu=-1
aeron.publisher.cpu=-1
# Max messages pulled per poll() call
aeron.fragment.limit=256

# --- Order Book ---
book.max.orders=1000000
book.max.price.levels=8192
book.max.products=1024
book.tick.window=500

# --- Latency probes ---
# Disabled probes have zero hot-path overhead (null check only)
latency.csv.parse=true
latency.aeron.publish=true
latency.aeron.subscribe=true
latency.book.apply=true
latency.e2e=true

# --- Benchmark ---
# Events to process before latency recording begins (JIT warm-up)
benchmark.warmup.events=300000
# HdrHistogram significant digits
latency.histogram.significant.digits=3
# Path for the per-probe CSV dump at shutdown
latency.output.file=output/latency_report.csv

# --- Output ---
output.snapshot.depth=5
output.print.top.of.book=true
