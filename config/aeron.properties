# =============================================================================
# HFT Trading System -- Aeron Pipeline Configuration
# =============================================================================
# Full pipeline: CsvFeedSource --> AeronPublisher --> [aeron:ipc] --> AeronSubscriber --> OrderBook
#
# Usage:
#   gradlew run --args="--config config/aeron.properties"
#   java @scripts/jvm.flags -jar build/libs/hftrading-1.0-SNAPSHOT.jar --config config/aeron.properties
#   scripts\run.cmd --config config/aeron.properties          (Windows)
#   ./scripts/run.sh --config config/aeron.properties         (Linux/macOS)
# =============================================================================

pipeline.mode=aeron

# --- Input ---
input.csv.path=out/bench_1m.csv
outinput.csv.buffer.bytes=262144

# --- Aeron ---
aeron.channel=aeron:ipc?term-length=65536
aeron.stream.id=1001
aeron.embed.driver=true
aeron.fragment.limit=256
# Set to a specific core number to pin threads, e.g. aeron.publisher.cpu=2
aeron.publisher.cpu=4
aeron.subscriber.cpu=5

# --- Order book ---
book.max.orders=1000000
book.max.price.levels=8192
book.max.products=1024
book.tick.window=500

# --- Latency probes (all on for full pipeline measurement) ---
latency.csv.parse=true
latency.aeron=true
latency.book.apply=true
latency.e2e=true
latency.histogram.significant.digits=3
latency.output.file=output/latency_report_aeron.csv

# --- Warm-up ---
benchmark.warmup.events=300000

# --- Output ---
output.snapshot.depth=5
output.print.top.of.book=true
